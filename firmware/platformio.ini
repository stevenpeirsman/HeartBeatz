; ==============================================================================
; HeartBeatz Sensor Node Firmware — PlatformIO Configuration
; ==============================================================================
; ESP32-S3 firmware for the HeartBeatz portable WiFi CSI sensing demo box.
;
; Hardware: ESP32-S3-DevKitC-1 (N16R8 recommended for 16MB flash / 8MB PSRAM)
; Protocol: ADR-018 binary CSI frames over UDP to sensing server
; Features: WiFi CSI, LD2410S radar (optional), OTA updates, LED status
;
; Build:   pio run
; Flash:   pio run --target upload
; Monitor: pio device monitor --baud 115200
;
; Source files are in main/ directory (ESP-IDF convention).

[platformio]
default_envs = heartbeatz-node
src_dir = main

; --- Common settings shared across environments ---
[common]
platform = espressif32 @ 6.5.0
board = esp32-s3-devkitc-1
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
board_build.partitions = partitions.csv

; --- Primary build environment ---
[env:heartbeatz-node]
extends = common

build_flags =
    ; WiFi CSI collection (must be enabled at compile time)
    -DCONFIG_ESP_WIFI_CSI_ENABLED=1

    ; WiFi network (GL.iNet portable router — SSID: HeartBeatz)
    -DHEARTBEATZ_WIFI_SSID=\"heartbeatz\"
    -DHEARTBEATZ_WIFI_PASS=\"heartbeatz\"

    ; Sensing server address (MeLE N100 on GL.iNet ethernet)
    -DHEARTBEATZ_SERVER_IP=\"192.168.8.244\"
    -DHEARTBEATZ_UDP_PORT=5005

    ; CSI collection settings (channel 0 = auto-detect GL.iNet channel)
    -DHEARTBEATZ_CSI_RATE_HZ=50
    -DHEARTBEATZ_CHANNEL=0

    ; LD2410S radar on UART1 (optional — set to 1 if radar is connected)
    -DHEARTBEATZ_RADAR_ENABLED=0
    -DHEARTBEATZ_RADAR_TX_PIN=17
    -DHEARTBEATZ_RADAR_RX_PIN=18
    -DHEARTBEATZ_RADAR_BAUD=256000

    ; LED status indicator (GPIO 48 = built-in LED on most S3 DevKits)
    -DHEARTBEATZ_LED_PIN=48

    ; Power management (0 = mains-powered demo, 1 = battery-saving mode)
    -DHEARTBEATZ_POWER_SAVE=0

    ; FreeRTOS tuning (set via sdkconfig, not build flags to avoid redefinition)

; --- Build environment with radar enabled (for nodes with LD2410S attached) ---
[env:heartbeatz-node-radar]
extends = common

build_flags =
    -DCONFIG_ESP_WIFI_CSI_ENABLED=1
    -DHEARTBEATZ_WIFI_SSID=\"heartbeatz\"
    -DHEARTBEATZ_WIFI_PASS=\"heartbeatz\"
    -DHEARTBEATZ_SERVER_IP=\"192.168.8.244\"
    -DHEARTBEATZ_UDP_PORT=5005
    -DHEARTBEATZ_CSI_RATE_HZ=50
    -DHEARTBEATZ_CHANNEL=0
    ; Radar ENABLED in this environment
    -DHEARTBEATZ_RADAR_ENABLED=1
    -DHEARTBEATZ_RADAR_TX_PIN=17
    -DHEARTBEATZ_RADAR_RX_PIN=18
    -DHEARTBEATZ_RADAR_BAUD=256000
    -DHEARTBEATZ_LED_PIN=48
    -DHEARTBEATZ_POWER_SAVE=0
    -DCONFIG_ESP_MAIN_TASK_STACK_SIZE=8192
    -DCONFIG_FREERTOS_HZ=1000

name: Firmware CI

on:
  push:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'
  pull_request:
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'

jobs:
  build:
    name: Build Firmware for ${{ matrix.target }}
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.2
    strategy:
      matrix:
        target: [esp32s3, esp32c3, esp32c6]
        include:
          - target: esp32s3
            sdkconfig: sdkconfig.defaults.esp32s3
            max_size: 950
          - target: esp32c3
            sdkconfig: sdkconfig.defaults.esp32c3
            max_size: 850
          - target: esp32c6
            sdkconfig: sdkconfig.defaults.esp32c6
            max_size: 850

    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        working-directory: firmware/esp32-csi-node
        run: |
          . $IDF_PATH/export.sh
          rm -rf build sdkconfig
          cp ${{ matrix.sdkconfig }} sdkconfig.defaults
          idf.py set-target ${{ matrix.target }}
          # Use reconfigure to ensure idf_component.yml rules are applied
          idf.py reconfigure
          idf.py build

      - name: Verify binary size (< ${{ matrix.max_size }} KB gate)
        working-directory: firmware/esp32-csi-node
        run: |
          BIN=build/esp32-csi-node.bin
          SIZE=$(stat -c%s "$BIN")
          MAX=$(( ${{ matrix.max_size }} * 1024))
          echo "Binary size: $SIZE bytes ($(( SIZE / 1024 )) KB)"
          echo "Size limit:  $MAX bytes (${{ matrix.max_size }} KB)"
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Firmware binary exceeds ${{ matrix.max_size }} KB size gate ($SIZE > $MAX)"
            exit 1
          fi
          echo "Binary size OK: $SIZE <= $MAX"

      - name: Verify flash image integrity
        working-directory: firmware/esp32-csi-node
        run: |
          ERRORS=0
          BIN=build/esp32-csi-node.bin

          # Check binary exists and is non-empty.
          if [ ! -s "$BIN" ]; then
            echo "::error::Binary not found or empty"
            exit 1
          fi

          # Check partition table magic (0xAA50 at offset 0).
          PT=build/partition_table/partition-table.bin
          if [ -f "$PT" ]; then
            MAGIC=$(xxd -l2 -p "$PT")
            if [ "$MAGIC" != "aa50" ]; then
              echo "::warning::Partition table magic mismatch: $MAGIC (expected aa50)"
              ERRORS=$((ERRORS + 1))
            fi
          fi

          # Check bootloader exists.
          BL=build/bootloader/bootloader.bin
          if [ ! -s "$BL" ]; then
            echo "::warning::Bootloader binary missing or empty"
            ERRORS=$((ERRORS + 1))
          fi

          # Verify non-zero data in binary (not all 0xFF padding).
          NONZERO=$(xxd -l 1024 -p "$BIN" | tr -d 'f' | wc -c)
          if [ "$NONZERO" -lt 100 ]; then
            echo "::error::Binary appears to be mostly padding (non-zero chars: $NONZERO)"
            ERRORS=$((ERRORS + 1))
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "::warning::Flash image verification completed with $ERRORS warning(s)"
          else
            echo "Flash image integrity verified"
          fi

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-csi-node-firmware-${{ matrix.target }}
          path: |
            firmware/esp32-csi-node/build/esp32-csi-node.bin
            firmware/esp32-csi-node/build/bootloader/bootloader.bin
            firmware/esp32-csi-node/build/partition_table/partition-table.bin
          retention-days: 30
